<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Winky+Sans:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./shoes.css">
    <title>Document</title>
</head>
<body>
<!-- 因為有個底色，而且layout一樣， 所以開一個div叫card就方便一齊apply effects。註card並非有效html，只是一個名-->
<main>
    <!-- sporty -->
    <div class="card card-sporty">
        <!-- <img src="image shoes sporty.png" alt="sports shoes" width="200" height="200" text-align="center"> -->
        <h2 class="sporty">Keep It Sporty</h2>
        <p>Clothing to keep you active and healthy</p>
        <button>View Collection</button>
    </div>
    <!-- casual -->
    <div class="card card-casual">
        <h2 class="casual">Keep It Casual</h2>
        <p>Shoes to keep you comfortable</p>
        <button>View Collection</button>
    </div>
    <!-- professional -->
    <div class="card card-formal">
        <h2 class="formal">Keep It Formal</h2>
        <p>Shoes to keep you lookingsharp</p>
        <button>View Collection</button>
    </div>
</main>
</body>
</html>
