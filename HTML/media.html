<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<!-- audio -->
    <audio src="song.mp3" type="audio/mp3" controls></audio>
<!-- audio with message -->
    <audio controls>
        <source src="song.mp3" type="audio/mp3" />
        <p>Your broswer does not support the audio element.</p>
    </audio>
<!-- audio with autoplay -->
    <audio controls autoplay>
        <source src="song.mp3" type="audio/mp3" />
        <p>Your broswer does not support the audio element.</p>
    </audio>
<!-- audio with loop -->
    <audio controls loop>
        <source src="song.mp3" type="audio/mp3" />
        <p>Your broswer does not support the audio element.</p>
    </audio>
<br/>
<!-- video -->
    <video width="400" height="300" controls src="video.mp4" type="video/quicktime">
    <p>Your broswer does not support the audio element.</p>
    </video>
<br/>
<!-- iframe -->
    <iframe src="invoice.pdf" frameborder="0" width="400" height="300"></iframe>

</body>
</html>
